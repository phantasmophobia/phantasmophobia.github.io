<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tri-Tone Image Filter</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --accent-red: #ff3333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 800px;
            width: 100%;
        }

        .canvas-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        canvas, img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            background: #000;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* The Color Ramp Sliders */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 12px;
            border-radius: 6px;
            outline: none;
            /* Gradient: Black -> Red -> White */
            background: linear-gradient(to right, #000 0%, #ff0000 50%, #fff 100%);
            border: 1px solid #444;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #fff;
            border: 2px solid #333;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .label-row {
            display: flex;
            justify-content: space-between;
        }

        .upload-btn {
            background-color: #444;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .upload-btn:hover { background-color: #555; }
    </style>
</head>
<body>

    <h1>Tri-Tone Threshold Filter</h1>

    <div class="container">
        <input type="file" id="upload" accept="image/*" class="upload-btn">
        
        <div class="canvas-container">
            <div>
                <p>Original</p>
                <img id="sourceImage" style="display:none;">
                <canvas id="inputCanvas"></canvas>
            </div>
            <div>
                <p>Filtered</p>
                <canvas id="outputCanvas"></canvas>
            </div>
        </div>

        <div class="controls">
            <div class="control-group">
                <div class="label-row">
                    <label>Threshold 1 (Black to Red)</label>
                    <span id="val1">33%</span>
                </div>
                <input type="range" id="thresh1" min="0" max="100" value="33">
            </div>

            <div class="control-group">
                <div class="label-row">
                    <label>Threshold 2 (Red to White)</label>
                    <span id="val2">66%</span>
                </div>
                <input type="range" id="thresh2" min="0" max="100" value="66">
            </div>
        </div>
    </div>

    <script>
        const upload = document.getElementById('upload');
        const thresh1 = document.getElementById('thresh1');
        const thresh2 = document.getElementById('thresh2');
        const val1Text = document.getElementById('val1');
        const val2Text = document.getElementById('val2');
        
        const inCanvas = document.getElementById('inputCanvas');
        const outCanvas = document.getElementById('outputCanvas');
        const inCtx = inCanvas.getContext('2d');
        const outCtx = outCanvas.getContext('2d');
        
        let img = new Image();

        upload.addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                img.onload = () => {
                    // Set canvas sizes
                    inCanvas.width = outCanvas.width = img.width;
                    inCanvas.height = outCanvas.height = img.height;
                    inCtx.drawImage(img, 0, 0);
                    applyFilter();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        function applyFilter() {
            if (!img.src) return;

            const t1 = thresh1.value / 100 * 255;
            const t2 = thresh2.value / 100 * 255;

            val1Text.innerText = thresh1.value + "%";
            val2Text.innerText = thresh2.value + "%";

            const imageData = inCtx.getImageData(0, 0, inCanvas.width, inCanvas.height);
            const data = imageData.data;

            for (let i = 0; i < data.length; i += 4) {
                // 1. Convert to Grayscale (Luminance)
                const avg = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];

                // 2. Apply Tri-Tone Logic
                if (avg < t1) {
                    // Black
                    data[i] = 0;     // R
                    data[i + 1] = 0; // G
                    data[i + 2] = 0; // B
                } else if (avg < t2) {
                    // Red
                    data[i] = 255;   // R
                    data[i + 1] = 0; // G
                    data[i + 2] = 0; // B
                } else {
                    // White
                    data[i] = 255;   // R
                    data[i + 1] = 255; // G
                    data[i + 2] = 255; // B
                }
            }

            outCtx.putImageData(imageData, 0, 0);
        }

        // Listen for slider changes
        thresh1.addEventListener('input', applyFilter);
        thresh2.addEventListener('input', applyFilter);
    </script>
</body>
</html>
