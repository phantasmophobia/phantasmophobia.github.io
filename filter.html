<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic 3-Tone Filter</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; background: #eef2f3; padding: 20px; color: #333; }
        .controls { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; width: 100%; text-align: center; }
        .slider-group { margin: 20px 0; display: flex; flex-direction: column; gap: 10px; }
        label { font-weight: bold; font-size: 0.9rem; }
        canvas { max-width: 100%; border-radius: 8px; margin-top: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); background: white; }
        input[type="range"] { width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <div class="controls">
        <h2>Adjustable 3-Tone Filter</h2>
        <input type="file" id="upload" accept="image/*" style="margin-bottom: 20px;">
        
        <div class="slider-group">
            <label id="label1">Black/Red Threshold: 85</label>
            <input type="range" id="thresh1" min="0" max="255" value="85">
            
            <label id="label2">Red/White Threshold: 170</label>
            <input type="range" id="thresh2" min="0" max="255" value="170">
        </div>
        <p><small>Black ➔ Threshold 1 ➔ Red ➔ Threshold 2 ➔ White</small></p>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const upload = document.getElementById('upload');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const t1 = document.getElementById('thresh1');
        const t2 = document.getElementById('thresh2');
        const l1 = document.getElementById('label1');
        const l2 = document.getElementById('label2');

        let originalImage = null;

        upload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                originalImage = new Image();
                originalImage.onload = processImage;
                originalImage.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        function processImage() {
            if (!originalImage) return;

            // Maintain boundaries (Threshold 1 cannot exceed Threshold 2)
            if (parseInt(t1.value) > parseInt(t2.value)) {
                t1.value = t2.value;
            }
            
            l1.innerText = `Black/Red Threshold: ${t1.value}`;
            l2.innerText = `Red/White Threshold: ${t2.value}`;

            canvas.width = originalImage.width;
            canvas.height = originalImage.height;
            ctx.drawImage(originalImage, 0, 0);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const val1 = parseInt(t1.value);
            const val2 = parseInt(t2.value);

            for (let i = 0; i < data.length; i += 4) {
                const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;

                if (avg < val1) {
                    data[i] = 0; data[i+1] = 0; data[i+2] = 0;         // Black
                } else if (avg < val2) {
                    data[i] = 255; data[i+1] = 0; data[i+2] = 0;       // Red
                } else {
                    data[i] = 255; data[i+1] = 255; data[i+2] = 255;   // White
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        t1.addEventListener('input', processImage);
        t2.addEventListener('input', processImage);
    </script>
</body>
</html>
