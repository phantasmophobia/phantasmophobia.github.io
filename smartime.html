<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMARTIME | Timers</title>
    <style>
        :root { --bg: #f4f4f4; --black: #000; --white: #fff; --gray: #888; }
        body { font-family: 'Comic Sans MS', sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; min-height: 100vh; }
        
        header { background: var(--black); color: var(--white); padding: 1rem 2rem; display: flex; justify-content: space-between; }
        main { flex: 1; padding: 2rem; }
        
        .timer-container { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 3rem; }

        /* Timer Card */
        .timer-card { 
            background: var(--white); border: 3px solid var(--black); border-radius: 15px; 
            padding: 20px; width: 260px; box-shadow: 6px 6px 0px var(--black);
        }

        .time-display { font-size: 2.5rem; margin: 10px 0; }
        
        .btn { 
            cursor: pointer; border: 2px solid var(--black); padding: 8px 12px; 
            font-weight: bold; font-family: inherit; transition: 0.1s;
        }
        .btn-switch { background: #ff7675; width: 100%; margin-top: 10px; display: none; }
        .btn-delete { background: #dfe6e9; font-size: 0.7rem; margin-top: 15px; }

        /* Create Button */
        .create-btn { 
            background: var(--gray); color: white; border: 3px solid var(--black); 
            border-radius: 15px; width: 180px; height: 180px; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; cursor: pointer; 
        }

        /* Modal */
        #modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: white; border: 4px solid var(--black); padding: 20px; z-index: 100; box-shadow: 10px 10px 0px var(--black); 
        }

        /* History Section */
        #history-section { border-top: 3px solid var(--black); background: #eee; padding: 20px; }
        .history-item { font-size: 0.9rem; padding: 5px 0; border-bottom: 1px dashed #ccc; }

        footer { background: var(--black); color: var(--white); padding: 1.5rem; }
    </style>
</head>
<body>

    <header>
        <div><strong>SMARTIME</strong></div>
        <nav>timers | about | sign-in</nav>
    </header>

    <main>
        <h1>TIMERS</h1>
        <div class="timer-container" id="timer-list">
            <div class="create-btn" onclick="openModal()">
                <div style="font-size: 4rem;">+</div>
                <div>create new</div>
            </div>
        </div>
    </main>

    <div id="history-section">
        <h3>HISTORY LOG</h3>
        <div id="history-list"><em>No sessions completed yet...</em></div>
    </div>

    <div id="modal">
        <h3>Create New Timer</h3>
        <input type="text" id="taskName" placeholder="Task (e.g. Physics)">
        <input type="number" id="studyMin" placeholder="Study Mins">
        <input type="number" id="entMin" placeholder="Break Mins">
        <br><br>
        <button class="btn" style="background:black; color:white" onclick="addTimer()">START</button>
        <button class="btn" onclick="closeModal()">Cancel</button>
    </div>

    <audio id="alarm-sound" src="alarm.mp3" preload="auto"></audio>

    <footer>footer</footer>

    <script>
        const timerList = document.getElementById('timer-list');
        const historyList = document.getElementById('history-list');
        const alarm = document.getElementById('alarm-sound');

        function openModal() { document.getElementById('modal').style.display = 'block'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function addHistory(msg) {
            const now = new Date().toLocaleTimeString();
            if(historyList.innerHTML.includes('<em>')) historyList.innerHTML = '';
            historyList.innerHTML = `<div class="history-item">[${now}] ${msg}</div>` + historyList.innerHTML;
        }

        function addTimer() {
            const name = document.getElementById('taskName').value || "Task";
            const sTime = parseInt(document.getElementById('studyMin').value) || 25;
            const eTime = parseInt(document.getElementById('entMin').value) || 5;
            createTimerCard(name, sTime, eTime);
            closeModal();
        }

        function createTimerCard(name, studyMins, entMins) {
            const card = document.createElement('div');
            card.className = 'timer-card';
            
            let isStudy = true;
            let mins = studyMins;
            let secs = 0;
            let isPaused = false;

            card.innerHTML = `
                <h3 style="margin:0">${name}</h3>
                <p style="font-size:0.8rem">Study: ${studyMins}m | Ent: ${entMins}m</p>
                <div class="state-label" style="color:red; font-weight:bold">MODE: STUDY</div>
                <div class="time-display">${mins}:00</div>
                <button class="btn btn-switch">CONFIRM & SWITCH</button>
                <br>
                <button class="btn btn-delete">Remove</button>
            `;

            const display = card.querySelector('.time-display');
            const stateLabel = card.querySelector('.state-label');
            const switchBtn = card.querySelector('.btn-switch');

            const interval = setInterval(() => {
                if (isPaused) return;

                if (secs === 0) {
                    if (mins === 0) {
                        // TIME IS UP
                        isPaused = true;
                        alarm.play().catch(e => console.log("Audio play failed: check file name"));
                        display.innerText = "0:00";
                        switchBtn.style.display = "block";
                        addHistory(`Completed ${isStudy ? 'Study' : 'Entertainment'} for ${name}`);
                        return;
                    }
                    mins--;
                    secs = 59;
                } else {
                    secs--;
                }
                display.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            }, 1000);

            // Manual Switch Button
            switchBtn.addEventListener('click', () => {
                alarm.pause();
                alarm.currentTime = 0;
                isStudy = !isStudy;
                mins = isStudy ? studyMins : entMins;
                secs = 0;
                isPaused = false;
                switchBtn.style.display = "none";
                stateLabel.innerText = `MODE: ${isStudy ? 'STUDY' : 'ENTERTAINMENT'}`;
                stateLabel.style.color = isStudy ? "red" : "blue";
                display.innerText = `${mins}:00`;
            });

            card.querySelector('.btn-delete').addEventListener('click', () => {
                clearInterval(interval);
                card.remove();
            });

            timerList.insertBefore(card, timerList.lastElementChild);
        }
    </script>
</body>
</html>
