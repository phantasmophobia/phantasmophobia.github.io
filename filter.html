<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dual-Handle Color Ramp Filter</title>
    <style>
        :root {
            --bg: #121212;
            --panel: #1e1e1e;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }

        .container {
            background: var(--panel);
            padding: 20px;
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
        }

        canvas {
            width: 100%;
            border-radius: 8px;
            background: #000;
            margin-bottom: 20px;
        }

        /* Multi-Slider Styling */
        .ramp-wrapper {
            position: relative;
            height: 50px;
            width: 100%;
            margin: 30px 0;
        }

        .ramp-background {
            position: absolute;
            top: 10px;
            width: 100%;
            height: 20px;
            border-radius: 10px;
            border: 1px solid #444;
            /* Gradient updated by JS */
            background: linear-gradient(to right, black 33%, red 33%, red 66%, white 66%);
        }

        .slider {
            position: absolute;
            pointer-events: none;
            -webkit-appearance: none;
            z-index: 2;
            height: 20px;
            width: 100%;
            top: 10px;
            background: none;
            outline: none;
            margin: 0;
        }

        /* Styling the handles */
        .slider::-webkit-slider-thumb {
            pointer-events: all;
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #fff;
            border: 3px solid #121212;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .upload-area {
            margin-bottom: 20px;
            border: 2px dashed #444;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            Click to Upload Image
            <input type="file" id="fileInput" hidden accept="image/*">
        </div>

        <canvas id="canvas"></canvas>

        <div class="ramp-wrapper">
            <div class="ramp-background" id="rampBg"></div>
            <input type="range" min="0" max="100" value="33" class="slider" id="slider1">
            <input type="range" min="0" max="100" value="66" class="slider" id="slider2">
        </div>

        <div class="stats">
            <span>Threshold Low: <b id="lbl1">33%</b></span>
            <span>Threshold High: <b id="lbl2">66%</b></span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const slider1 = document.getElementById('slider1');
        const slider2 = document.getElementById('slider2');
        const rampBg = document.getElementById('rampBg');
        const lbl1 = document.getElementById('lbl1');
        const lbl2 = document.getElementById('lbl2');

        let originalImg = null;

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    originalImg = img;
                    render();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        function updateRamp() {
            // Ensure slider 1 is always lower than slider 2
            if (parseInt(slider1.value) > parseInt(slider2.value)) {
                let tmp = slider1.value;
                slider1.value = slider2.value;
                slider2.value = tmp;
            }

            const v1 = slider1.value;
            const v2 = slider2.value;
            
            lbl1.innerText = v1 + "%";
            lbl2.innerText = v2 + "%";

            // Update background color ramp to be accurate
            rampBg.style.background = `linear-gradient(to right, 
                #000 0%, #000 ${v1}%, 
                #ff0000 ${v1}%, #ff0000 ${v2}%, 
                #fff ${v2}%, #fff 100%)`;
            
            render();
        }

        function render() {
            if (!originalImg) return;

            // Maintain aspect ratio
            const scale = Math.min(800 / originalImg.width, 1);
            canvas.width = originalImg.width * scale;
            canvas.height = originalImg.height * scale;
            
            ctx.drawImage(originalImg, 0, 0, canvas.width, canvas.height);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const t1 = (slider1.value / 100) * 255;
            const t2 = (slider2.value / 100) * 255;

            for (let i = 0; i < data.length; i += 4) {
                const gray = 0.21 * data[i] + 0.72 * data[i+1] + 0.07 * data[i+2];
                
                if (gray < t1) {
                    data[i] = 0; data[i+1] = 0; data[i+2] = 0;
                } else if (gray < t2) {
                    data[i] = 255; data[i+1] = 0; data[i+2] = 0;
                } else {
                    data[i] = 255; data[i+1] = 255; data[i+2] = 255;
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        slider1.oninput = updateRamp;
        slider2.oninput = updateRamp;
    </script>
</body>
</html>
