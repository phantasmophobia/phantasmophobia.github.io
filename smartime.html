<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMARTIME | Pro</title>
    <style>
        :root {
            --bg: #f4f4f4;
            --text: #000;
            --card-bg: #fff;
            --border: #000;
            --accent: #888;
        }

        [data-theme="dark"] {
            --bg: #1a1a1a;
            --text: #f4f4f4;
            --card-bg: #2d2d2d;
            --border: #f4f4f4;
            --accent: #444;
        }

        body { 
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
            margin: 0; background: var(--bg); color: var(--text);
            transition: background 0.3s, color 0.3s;
            display: flex; flex-direction: column; min-height: 100vh;
        }
        
        header { 
            background: var(--border); color: var(--bg); 
            padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center;
        }

        .theme-toggle {
            cursor: pointer; background: var(--bg); color: var(--text);
            border: 2px solid var(--text); padding: 5px 10px; font-weight: bold;
        }

        main { flex: 1; padding: 2rem; }
        .timer-container { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 2rem; }

        /* Timer Card */
        .timer-card { 
            background: var(--card-bg); border: 3px solid var(--border); border-radius: 15px; 
            padding: 20px; width: 260px; box-shadow: 6px 6px 0px var(--border);
            position: relative;
        }

        .time-display { font-size: 3rem; margin: 10px 0; font-weight: bold; }
        
        .btn { 
            cursor: pointer; border: 2px solid var(--border); padding: 8px 12px; 
            font-weight: bold; font-family: inherit; margin: 5px 2px;
        }
        .btn-switch { background: #ff7675; width: 100%; display: none; color: white; }
        .btn-delete { background: transparent; color: var(--text); font-size: 0.7rem; opacity: 0.6; }

        /* Create Button */
        .create-btn { 
            background: var(--accent); color: white; border: 3px solid var(--border); 
            border-radius: 15px; width: 180px; height: 180px; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; cursor: pointer; 
        }

        /* Modal */
        #modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: var(--card-bg); border: 4px solid var(--border); padding: 25px; 
            z-index: 100; box-shadow: 12px 12px 0px var(--border); width: 300px;
        }
        input, select { width: 100%; margin: 8px 0; padding: 8px; border: 2px solid var(--border); box-sizing: border-box; }

        /* History */
        #history-section { border-top: 3px solid var(--border); background: var(--accent); padding: 20px; color: white; }
        .history-item { background: rgba(0,0,0,0.2); margin: 5px 0; padding: 8px; border-radius: 5px; font-size: 0.85rem; }

        footer { background: var(--border); color: var(--bg); padding: 1.5rem; text-align: center; }
    </style>
</head>
<body data-theme="light">

    <header>
        <div><strong>SMARTIME</strong> | timers | about</div>
        <button class="theme-toggle" onclick="toggleTheme()">TOGGLE THEME</button>
    </header>

    <main>
        <h1>TIMERS</h1>
        <div class="timer-container" id="timer-list">
            <div class="create-btn" onclick="openModal()">
                <div style="font-size: 4rem;">+</div>
                <div>create new</div>
            </div>
        </div>
    </main>

    <div id="history-section">
        <h3>SESSION LOG</h3>
        <div id="history-list"><em>No data recorded yet...</em></div>
    </div>

    <div id="modal">
        <h3 style="margin-top:0">Settings</h3>
        <label>Task Name</label>
        <input type="text" id="taskName" placeholder="e.g. Coding">
        
        <label>Study Mins</label>
        <input type="number" id="studyMin" value="25">
        
        <label>Entertainment Mins</label>
        <input type="number" id="entMin" value="5">
        
        <label>Start With:</label>
        <select id="startMode">
            <option value="study">Study</option>
            <option value="entertainment">Entertainment</option>
        </select>
        
        <br><br>
        <button class="btn" style="background:var(--border); color:var(--bg)" onclick="addTimer()">ADD TIMER</button>
        <button class="btn" onclick="closeModal()">CANCEL</button>
    </div>

    <audio id="alarm-sound" src="alarm.mp3" preload="auto"></audio>

    <footer>SMARTIME Concept</footer>

    <script>
        const timerList = document.getElementById('timer-list');
        const historyList = document.getElementById('history-list');
        const alarm = document.getElementById('alarm-sound');

        // Theme Toggle Logic
        function toggleTheme() {
            const body = document.body;
            const current = body.getAttribute('data-theme');
            body.setAttribute('data-theme', current === 'light' ? 'dark' : 'light');
        }

        function openModal() { document.getElementById('modal').style.display = 'block'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function addHistory(task, mode) {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            if(historyList.innerHTML.includes('<em>')) historyList.innerHTML = '';
            const item = `<div class="history-item"><strong>[${time}]</strong> Finished ${mode} session for <strong>${task}</strong></div>`;
            historyList.insertAdjacentHTML('afterbegin', item);
        }

        function addTimer() {
            const config = {
                name: document.getElementById('taskName').value || "Task",
                study: parseInt(document.getElementById('studyMin').value) || 25,
                ent: parseInt(document.getElementById('entMin').value) || 5,
                mode: document.getElementById('startMode').value
            };
            createTimerCard(config);
            closeModal();
        }

        function createTimerCard(cfg) {
            const card = document.createElement('div');
            card.className = 'timer-card';
            
            let isStudy = (cfg.mode === 'study');
            let mins = isStudy ? cfg.study : cfg.ent;
            let secs = 0;
            let isPaused = false;

            card.innerHTML = `
                <h3 style="margin:0">${cfg.name}</h3>
                <div class="state-label" style="font-weight:bold; margin-top:5px;">${isStudy ? 'STUDY' : 'BREAK'}</div>
                <div class="time-display">${mins}:00</div>
                <button class="btn btn-switch">START NEXT PHASE</button>
                <button class="btn btn-delete">Remove</button>
            `;

            const display = card.querySelector('.time-display');
            const stateLabel = card.querySelector('.state-label');
            const switchBtn = card.querySelector('.btn-switch');

            const interval = setInterval(() => {
                if (isPaused) return;

                if (secs === 0) {
                    if (mins === 0) {
                        isPaused = true;
                        alarm.play().catch(() => {}); 
                        switchBtn.style.display = "block";
                        addHistory(cfg.name, isStudy ? 'Study' : 'Entertainment');
                        return;
                    }
                    mins--; secs = 59;
                } else {
                    secs--;
                }
                display.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            }, 1000);

            switchBtn.addEventListener('click', () => {
                alarm.pause(); alarm.currentTime = 0;
                isStudy = !isStudy;
                mins = isStudy ? cfg.study : cfg.ent;
                secs = 0;
                isPaused = false;
                switchBtn.style.display = "none";
                stateLabel.innerText = isStudy ? 'STUDY' : 'BREAK';
                display.innerText = `${mins}:00`;
            });

            card.querySelector('.btn-delete').addEventListener('click', () => {
                clearInterval(interval);
                card.remove();
            });

            timerList.insertBefore(card, timerList.lastElementChild);
        }
    </script>
</body>
</html>
