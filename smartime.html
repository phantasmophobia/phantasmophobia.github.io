<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMARTIME | Pro</title>
    <style>
        :root {
            --bg: #f4f4f4; --text: #000; --card-bg: #fff; --border: #000; --accent: #888;
        }
        [data-theme="dark"] {
            --bg: #1a1a1a; --text: #f4f4f4; --card-bg: #2d2d2d; --border: #f4f4f4; --accent: #444;
        }

        body { 
            font-family: 'Comic Sans MS', sans-serif; margin: 0; background: var(--bg); color: var(--text);
            transition: background 0.3s; display: flex; flex-direction: column; min-height: 100vh;
        }
        
        /* Header & Nav */
        header { 
            background: var(--border); color: var(--bg); padding: 1rem 2rem; 
            display: flex; justify-content: space-between; align-items: center;
        }
        nav span { cursor: pointer; margin: 0 10px; text-decoration: underline; }

        main { flex: 1; padding: 2rem; }
        .timer-container { display: flex; gap: 20px; flex-wrap: wrap; }

        /* Timer Card */
        .timer-card { 
            background: var(--card-bg); border: 3px solid var(--border); border-radius: 15px; 
            padding: 20px; width: 260px; box-shadow: 6px 6px 0px var(--border);
        }
        .time-display { font-size: 3rem; margin: 10px 0; font-weight: bold; }

        /* Pop-up Modals */
        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--card-bg); border: 4px solid var(--border); padding: 30px;
            width: 350px; box-shadow: 15px 15px 0px var(--border); color: var(--text);
        }

        /* Buttons */
        .btn { cursor: pointer; border: 2px solid var(--border); padding: 10px; font-weight: bold; font-family: inherit; margin-top: 10px; width: 100%; }
        .create-btn { 
            background: var(--accent); color: white; border: 3px solid var(--border); 
            border-radius: 15px; width: 150px; height: 150px; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; cursor: pointer; 
        }

        /* Stats Bar */
        #stats-bar { background: var(--border); color: var(--bg); padding: 10px 20px; display: flex; gap: 20px; font-size: 0.9rem; }
    </style>
</head>
<body data-theme="light">

    <header>
        <div><strong>SMARTIME</strong></div>
        <nav>
            <span onclick="location.reload()">timers</span> | 
            <span onclick="showModal('about-modal')">about</span> | 
            <span onclick="showModal('login-modal')">sign-in</span>
        </nav>
        <button onclick="toggleTheme()" style="cursor:pointer">🌓</button>
    </header>

    <div id="stats-bar">
        <span>Today's Progress:</span>
        <span>Study: <b id="stat-study">0</b>m</span>
        <span>Rest: <b id="stat-ent">0</b>m</span>
    </div>

    <main>
        <h1>TIMERS</h1>
        <div class="timer-container" id="timer-list">
            <div class="create-btn" onclick="showModal('create-modal')">
                <div style="font-size: 3rem;">+</div>
                <div>create new</div>
            </div>
        </div>
    </main>

    <div id="about-modal" class="overlay" onclick="closeModals(event)">
        <div class="modal-content">
            <h2>About SMARTIME</h2>
            <p>https://discord.gg/AC67297ZeS</p>
            <p>Created to help you balance deep study with deserved breaks.</p>
            <button class="btn" onclick="hideModal('about-modal')">Close</button>
        </div>
    </div>

    <div id="login-modal" class="overlay" onclick="closeModals(event)">
        <div class="modal-content">
            <h2>Sign In</h2>
            <input type="text" placeholder="Username" style="width:90%; padding:10px; margin-bottom:10px;">
            <input type="password" placeholder="Password" style="width:90%; padding:10px;">
            <button class="btn" onclick="alert('Demo Mode: No account needed!')">Login</button>
            <button class="btn" onclick="hideModal('login-modal')">Close</button>
        </div>
    </div>

    <div id="create-modal" class="overlay" onclick="closeModals(event)">
        <div class="modal-content">
            <h3>New Timer</h3>
            <label>Name:</label><br><input type="text" id="taskName" value="Biology" style="width:95%"><br><br>
            <label>Study (mins):</label><br><input type="number" id="studyMin" value="25" style="width:95%"><br><br>
            <label>Break (mins):</label><br><input type="number" id="entMin" value="5" style="width:95%"><br><br>
            <label>Start with:</label>
            <select id="startMode" style="width:100%; padding:5px;">
                <option value="study">Study</option>
                <option value="entertainment">Entertainment</option>
            </select>
            <button class="btn" style="background:black; color:white" onclick="addTimer()">CREATE</button>
        </div>
    </div>

    <audio id="alarm-sound" src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg" preload="auto"></audio>

    <script>
        let totalStudy = 0;
        let totalEnt = 0;

        function toggleTheme() {
            document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
        }

        function showModal(id) { document.getElementById(id).style.display = 'flex'; }
        function hideModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function closeModals(e) { if(e.target.className === 'overlay') e.target.style.display = 'none'; }

        function addTimer() {
            const name = document.getElementById('taskName').value;
            const s = parseInt(document.getElementById('studyMin').value);
            const e = parseInt(document.getElementById('entMin').value);
            const mode = document.getElementById('startMode').value;
            
            createTimerCard(name, s, e, mode);
            hideModal('create-modal');
        }

        function createTimerCard(name, studyM, entM, startMode) {
            const card = document.createElement('div');
            card.className = 'timer-card';
            let isStudy = (startMode === 'study');
            let mins = isStudy ? studyM : entM;
            let secs = 0;
            let isPaused = false;

            card.innerHTML = `
                <h3 style="margin:0">${name}</h3>
                <div class="mode-label" style="font-weight:bold; color:red">${isStudy ? 'STUDY' : 'BREAK'}</div>
                <div class="time-display">${mins}:00</div>
                <button class="btn switch-btn" style="display:none; background:orange">START NEXT</button>
                <button class="btn" onclick="this.parentElement.remove()" style="font-size:10px; border:none; background:none; text-decoration:underline">remove</button>
            `;

            const display = card.querySelector('.time-display');
            const modeLabel = card.querySelector('.mode-label');
            const sBtn = card.querySelector('.switch-btn');

            const ticker = setInterval(() => {
                if(isPaused) return;
                if(secs === 0) {
                    if(mins === 0) {
                        isPaused = true;
                        document.getElementById('alarm-sound').play();
                        sBtn.style.display = 'block';
                        // Update Stats
                        if(isStudy) { totalStudy += studyM; document.getElementById('stat-study').innerText = totalStudy; }
                        else { totalEnt += entM; document.getElementById('stat-ent').innerText = totalEnt; }
                        return;
                    }
                    mins--; secs = 59;
                } else { secs--; }
                display.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            }, 1000);

            sBtn.onclick = () => {
                isPaused = false; sBtn.style.display = 'none';
                isStudy = !isStudy;
                mins = isStudy ? studyM : entM; secs = 0;
                modeLabel.innerText = isStudy ? 'STUDY' : 'BREAK';
                modeLabel.style.color = isStudy ? 'red' : 'blue';
            };

            document.getElementById('timer-list').insertBefore(card, document.getElementById('timer-list').lastElementChild);
        }
    </script>
</body>
</html>
