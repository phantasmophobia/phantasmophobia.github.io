<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siri's Learning Lab</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --text-color: #1d1d1f;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* --- LIQUID GLASS THEME --- */
        .glass-container {
            position: relative;
            width: 80%;
            max-width: 600px;
            padding: 40px;
            border-radius: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px) url(#liquid-glass);
            -webkit-backdrop-filter: blur(20px) url(#liquid-glass);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            text-align: center;
            z-index: 10;
        }

        /* Specular Highlight Rim */
        .glass-container::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 40px;
            border: 1.5px solid rgba(255,255,255,0.4);
            pointer-events: none;
        }

        h1 { font-size: 2.5rem; color: #444; margin-bottom: 10px; }
        .word-display { font-size: 5rem; font-weight: bold; color: #333; margin: 20px 0; }
        
        .controls { display: flex; gap: 20px; justify-content: center; margin-top: 30px; }
        
        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 20px;
            border: none;
            background: white;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        button:active { transform: scale(0.95); }
        button.record { background: #ff4b2b; color: white; }
        button.next { background: #007aff; color: white; }

        #level-select {
            margin-bottom: 20px;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #ccc;
        }

        /* Hidden Canvas for Refraction Map Generation */
        #map-gen { display: none; }
    </style>
</head>
<body>

    <div class="glass-container">
        <h1>Hello! 👋</h1>
        <select id="level-select">
            <option value="easy">Level 1: Animals & Things</option>
            <option value="medium">Level 2: Actions</option>
            <option value="stories">Level 3: Mini Stories</option>
        </select>

        <div id="display-area">
            <div class="word-display" id="word-target">CAT</div>
            <p id="feedback">Press the red button and say the word!</p>
        </div>

        <div class="controls">
            <button class="record" id="mic-btn">🎙️ Speak</button>
            <button class="next" id="next-btn">Next Word ➡️</button>
        </div>
    </div>

    <svg style="display: none;">
        <defs>
            <filter id="liquid-glass" color-interpolation-filters="sRGB">
                <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="2" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="15" xChannelSelector="R" yChannelSelector="G" />
            </filter>
        </defs>
    </svg>

    <script>
        const API_KEY = "AIzaSyDM9CuF9Udxd81SLUzqu9ioTQQZl-sta3I";
        const wordTarget = document.getElementById('word-target');
        const micBtn = document.getElementById('mic-btn');
        const feedback = document.getElementById('feedback');
        const levelSelect = document.getElementById('level-select');

        const words = {
            easy: ["DOG", "SUN", "BOOK", "RED", "FISH", "HAT"],
            medium: ["JUMP", "RUN", "PLAY", "EAT", "SLEEP"],
            stories: ["The cat sat.", "Big blue bus.", "I love you."]
        };

        let currentLevel = "easy";
        let currentIndex = 0;

        // 1. Level Selection Logic
        levelSelect.onchange = (e) => {
            currentLevel = e.target.value;
            currentIndex = 0;
            updateWord();
        };

        function updateWord() {
            wordTarget.innerText = words[currentLevel][currentIndex];
            feedback.innerText = "Press the red button and say the word!";
            feedback.style.color = "black";
        }

        document.getElementById('next-btn').onclick = () => {
            currentIndex = (currentIndex + 1) % words[currentLevel].length;
            updateWord();
        };

        // 2. AI Voice Recognition (Simulated via Web Speech for speed, Gemini for Analysis)
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US';

        micBtn.onclick = () => {
            recognition.start();
            feedback.innerText = "Listening...";
            micBtn.style.boxShadow = "0 0 20px red";
        };

        recognition.onresult = async (event) => {
            const transcript = event.results[0][0].transcript.toUpperCase();
            const target = wordTarget.innerText.toUpperCase();
            micBtn.style.boxShadow = "none";

            feedback.innerText = `You said: ${transcript}... checking with AI!`;
            
            // 3. Ask Gemini if the pronunciation was close enough for a 4-year-old
            checkWithGemini(transcript, target);
        };

        async function checkWithGemini(said, target) {
            const prompt = `A 4-year-old trying to learn English said "${said}". The word was "${target}". 
                           Is this close enough? Answer in 1 word: YES or NO.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                const result = data.candidates[0].content.parts[0].text.trim().toUpperCase();

                if (result.includes("YES")) {
                    feedback.innerText = "🌟 GREAT JOB! 🌟";
                    feedback.style.color = "green";
                    speakText("Great job! You are so smart.");
                } else {
                    feedback.innerText = "So close! Try one more time.";
                    feedback.style.color = "#d9534f";
                }
            } catch (error) {
                console.error("AI Error:", error);
                // Fallback if API fails
                if (said.includes(target)) {
                    feedback.innerText = "Good job!";
                    speakText("Good job!");
                }
            }
        }

        function speakText(msg) {
            const speech = new SpeechSynthesisUtterance(msg);
            window.speechSynthesis.speak(speech);
        }

        // Initialize first word
        updateWord();
    </script>
</body>
</html>
