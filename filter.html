<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adjustable 3-Tone Filter</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; background: #1a1a1a; color: white; padding: 20px; }
        .controls { background: #2a2a2a; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center; margin-bottom: 20px; }
        canvas { max-width: 90vw; border: 4px solid #444; border-radius: 4px; background: #000; }
        .slider-wrap { margin: 20px 0; }
        input[type=range] { width: 300px; cursor: pointer; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #ff4444; }
    </style>
</head>
<body>

    <div class="controls">
        <h2>3-Tone Image Processor</h2>
        <input type="file" id="upload" accept="image/*"><br><br>
        
        <div class="slider-wrap">
            <label id="label">Threshold Balance: 50/50</label>
            <input type="range" id="threshold" min="10" max="245" value="127">
        </div>
        <p><small>Adjusts the midpoint between Black, Red, and White</small></p>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const upload = document.getElementById('upload');
        const threshold = document.getElementById('threshold');
        const label = document.getElementById('label');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let originalImg = null;

        // Handle Image Upload
        upload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                originalImg = new Image();
                originalImg.onload = () => {
                    canvas.width = originalImg.width;
                    canvas.height = originalImg.height;
                    applyFilter();
                };
                originalImg.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // Update when slider moves
        threshold.addEventListener('input', () => {
            if (originalImg) applyFilter();
            label.innerText = `Threshold Balance: ${Math.round((threshold.value / 255) * 100)}%`;
        });

        function applyFilter() {
            ctx.drawImage(originalImg, 0, 0);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            
            const mid = parseInt(threshold.value);
            // We split the range into two halves based on the slider
            const lowerBound = mid / 2;
            const upperBound = mid + ((255 - mid) / 2);

            for (let i = 0; i < data.length; i += 4) {
                const avg = (data[i] + data[i+1] + data[i+2]) / 3;

                if (avg < lowerBound) {
                    // Black
                    data[i] = 0; data[i+1] = 0; data[i+2] = 0;
                } else if (avg < upperBound) {
                    // Red
                    data[i] = 255; data[i+1] = 0; data[i+2] = 0;
                } else {
                    // White
                    data[i] = 255; data[i+1] = 255; data[i+2] = 255;
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }
    </script>
</body>
</html>
